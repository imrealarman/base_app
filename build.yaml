targets:
  $default:
    builders:
      # The default builder conflicts with pre-existing strings.g.dart files
      # (e.g. after a fresh git clone with no .dart_tool cache yet) with
      # "Asset already exists". The legacy builder writes directly via
      # dart:io instead, which doesn't have this problem.
      slang_build_runner:
        enabled: false
      slang_build_runner:legacy:
        options:
          base_locale: en
