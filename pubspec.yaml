name: base_app
description: "A configurable Flutter app template with feature flags, environments, and theming."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  forui: ^0.23.0
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.2
  go_router: ^17.3.0
  flutter_dotenv: ^5.2.1
  dio: ^5.10.0
  slang: ^4.18.0
  slang_flutter: ^4.18.0
  shared_preferences: ^2.5.5
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  riverpod_generator: ^4.0.3
  riverpod_lint: ^3.1.4
  mocktail: ^1.0.5
  slang_build_runner: ^4.18.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - .env.dev
    - .env.staging
    - .env.prod
  fonts:
    - family: AppFont
      fonts:
        - asset: lib/assets/fonts/app_font.ttf

# Drop-in convention, same idea as the font: replace lib/assets/icon/icon.png
# with your own 1024x1024 PNG, then run:
#   dart run flutter_launcher_icons
#   dart run flutter_native_splash:create
# See docs/icons-and-splash.md.
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "lib/assets/icon/icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#18181B"
  image: "lib/assets/icon/icon.png"
  android_12:
    image: "lib/assets/icon/icon.png"
    color: "#FFFFFF"
    color_dark: "#18181B"
